name: SQA V&V Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Validation Script
        run: python scripts/validation.py

      - name: Run Verification Script
        run: python scripts/verification.py
        
      - name: Upload Forensics Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensics-log
          path: forensics.log